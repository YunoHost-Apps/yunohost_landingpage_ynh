rewrite ^/$ /index.html last;

location ~ ^/index\.(.*\.)?html$ {
    alias __INSTALL_DIR__/www/;
    try_files $uri index.$landingpage_lang.html index.en.html;
}

location ~ ^/assets/ {
    alias __INSTALL_DIR__/www/;
    try_files $uri $uri;
    more_set_headers "Cache-Control: public, max-age=300";
}

location = /favicon.ico {
    return 302 assets/img/ynh_logo_roundcorner.png;
    log_not_found off;
    access_log off;
}

location = /robots.txt {
    allow all;
    log_not_found off;
    access_log off;
}

location = /github {
    proxy_pass http://127.0.0.1:__PORT__/hooks/github;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
